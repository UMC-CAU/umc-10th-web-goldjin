<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>To Do List</title>
  <link rel="stylesheet" href="style.css"/>
</head>

<body>
<div class="card">
    <header>
            <h1>YONG TODO</h1>
            <div class="todo-input">
            <input type="text" id="todo-input__input" placeholder="할 일 입력"><button class="todo-input__button">할 일 추가</button>
            </div>
    </header>
    <main>
        <section class="todo-list">
            <h2>할 일</h2>
            <ul class="todo-list__list">
            </ul>
        </section>
        <section class="done-list">
            <h2>완료</h2>
            <ul class="done-list__list">

            </ul>
        </section>
    </main>
</div>
</body>
<script src="dist/script.js"></script>
</html>
